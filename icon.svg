<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1b223c" />
      <stop offset="100%" stop-color="#0b0f19" />
    </radialGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Orange Gradient (Fire) -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7043" />
      <stop offset="100%" stop-color="#ff3d00" />
    </linearGradient>
    
    <!-- Lime Gradient (Energy) -->
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eeff41" />
      <stop offset="100%" stop-color="#76ff03" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" stroke="#ff7043" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-opacity="0.2" filter="url(#neonGlow)"/>

  <!-- Dumbbell & Flame Group -->
  <g filter="url(#neonGlow)">
    <!-- Dumbbell Shaft -->
    <rect x="140" y="240" width="232" height="32" rx="8" fill="url(#orangeGrad)" />
    
    <!-- Dumbbell Plates Left -->
    <rect x="110" y="160" width="30" height="192" rx="10" fill="url(#orangeGrad)" />
    <rect x="70" y="190" width="30" height="132" rx="8" fill="url(#orangeGrad)" opacity="0.85" />
    
    <!-- Dumbbell Plates Right -->
    <rect x="372" y="160" width="30" height="192" rx="10" fill="url(#orangeGrad)" />
    <rect x="412" y="190" width="30" height="132" rx="8" fill="url(#orangeGrad)" opacity="0.85" />

    <!-- Flame symbol in the center (push your limits) -->
    <path d="M 256,140 
             C 278,180 298,195 298,225
             C 298,258 274,282 256,282
             C 238,282 214,258 214,225
             C 214,195 234,180 256,140 Z" 
          fill="url(#limeGrad)" />
          
    <path d="M 256,175 
             C 266,200 276,210 276,230
             C 276,250 266,262 256,262
             C 246,262 236,250 236,230
             C 236,210 246,200 256,175 Z" 
          fill="url(#orangeGrad)" />
  </g>
</svg>
